name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      # Note: deliberately no `registry-url:` here. When set,
      # actions/setup-node@v4 writes a temp .npmrc that references
      # `${NODE_AUTH_TOKEN}` — and if NODE_AUTH_TOKEN isn't injected
      # too, the placeholder literal `XXXXX-XXXXX-...` lands in the
      # .npmrc and shadows the one changesets/action writes from
      # NPM_TOKEN. Letting changesets/action own the .npmrc fully
      # avoids that conflict.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      # Diagnostic: confirm the NPM_TOKEN secret resolves to a token
      # npm actually accepts, before changesets/action burns time
      # building tarballs. Prints token length + first/last 4 chars +
      # whoami response — never the full secret. If whoami doesn't say
      # `davepi`, the secret value is wrong; fix before debugging
      # anything downstream.
      - name: Verify NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is empty"; exit 1
          fi
          len=${#NPM_TOKEN}
          first4=${NPM_TOKEN:0:4}
          last4=${NPM_TOKEN: -4}
          echo "token len=$len first4=$first4 last4=$last4"
          echo "whoami response:"
          curl -sS -H "Authorization: Bearer $NPM_TOKEN" https://registry.npmjs.org/-/whoami
          echo

      # Either opens a "Version Packages" PR collecting all queued
      # changesets, OR (when that PR has been merged and version bumps
      # are in main) publishes the bumped packages to npm + tags the
      # release. The publish step runs only after the `npm-publish`
      # environment approval gate clears — same gating pattern davepi
      # uses for its per-package workflows.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
